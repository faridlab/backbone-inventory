# =============================================================================
# Module: Inventory
# Entity: StockMovement
# Description: All stock IN/OUT movements with full audit trail
# =============================================================================

external_imports:
  - module: sapiens
    types: [User]

# =============================================================================
# Enums
# =============================================================================

enums:
  - name: MovementType
    description: "Type of stock movement"
    variants:
      - name: receipt
        description: "Goods receipt (IN)"
        default: true
      - name: issue
        description: "Goods issue (OUT)"
      - name: transfer_in
        description: "Transfer in"
      - name: transfer_out
        description: "Transfer out"
      - name: adjustment_in
        description: "Adjustment increase"
      - name: adjustment_out
        description: "Adjustment decrease"
      - name: consumption
        description: "Consumption (for orders)"
      - name: return_in
        description: "Return from customer"
      - name: return_out
        description: "Return to supplier"
      - name: write_off
        description: "Write-off/disposal"

  - name: MovementReason
    description: "Reason for movement"
    variants:
      - name: purchase
        description: "Purchase receipt"
        default: true
      - name: sale
        description: "Sale/consumption"
      - name: transfer
        description: "Inter-location transfer"
      - name: adjustment
        description: "Stock adjustment"
      - name: damage
        description: "Damaged goods"
      - name: expiry
        description: "Expired goods"
      - name: theft
        description: "Theft/loss"
      - name: count_variance
        description: "Stock count variance"
      - name: other
        description: "Other reason"

  - name: MovementStatus
    description: "Movement status"
    variants:
      - name: posted
        description: "Posted to inventory"
        default: true
      - name: cancelled
        description: "Cancelled"

# =============================================================================
# Models
# =============================================================================

models:
  - name: StockMovement
    collection: stock_movements
    soft_delete: false
    description: "Stock movement record"
    config:
      generators:
        disabled: [handler, usecase, cqrs, projection, bulk-operations]

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique movement identifier"

      provider_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Provider owner - logical FK to bersihir.Provider.id"

      # =======================================================================
      # Identity
      # =======================================================================
      movement_number:
        type: string
        attributes: ["@required", "@max(30)"]
        description: "Movement reference number"

      # =======================================================================
      # Classification
      # =======================================================================
      movement_type:
        type: MovementType
        attributes: ["@required", "@default(receipt)"]
        description: "Type of movement"

      movement_reason:
        type: MovementReason
        attributes: ["@default(purchase)"]
        description: "Reason for movement"

      # =======================================================================
      # Product
      # =======================================================================
      product_id:
        type: uuid
        attributes: ["@required", "@foreign_key(Product.id)"]
        description: "Product moved"

      # =======================================================================
      # Location
      # =======================================================================
      warehouse_id:
        type: uuid?
        attributes: ["@foreign_key(Warehouse.id)"]
        description: "Warehouse"

      from_location:
        type: string?
        attributes: ["@max(100)"]
        description: "Source location"

      to_location:
        type: string?
        attributes: ["@max(100)"]
        description: "Destination location"

      # =======================================================================
      # Quantity
      # =======================================================================
      quantity:
        type: decimal
        attributes: ["@required", "@precision(12,4)"]
        description: "Movement quantity (+ for IN, - for OUT)"

      uom:
        type: string
        attributes: ["@required", "@max(20)"]
        description: "Unit of measure"

      # =======================================================================
      # Balance
      # =======================================================================
      balance_before:
        type: decimal
        attributes: ["@precision(12,4)"]
        description: "Stock balance before movement"

      balance_after:
        type: decimal
        attributes: ["@precision(12,4)"]
        description: "Stock balance after movement"

      # =======================================================================
      # Batch/Lot
      # =======================================================================
      batch_id:
        type: uuid?
        attributes: ["@foreign_key(StockBatch.id)"]
        description: "Stock batch"

      batch_number:
        type: string?
        attributes: ["@max(50)"]
        description: "Batch/lot number"

      expiry_date:
        type: date?
        description: "Expiry date"

      # =======================================================================
      # Costing
      # =======================================================================
      unit_cost:
        type: decimal
        attributes: ["@precision(14,4)", "@non_negative"]
        description: "Unit cost"

      total_cost:
        type: decimal
        attributes: ["@precision(14,2)"]
        description: "Total cost (unit x quantity)"

      currency:
        type: string
        attributes: ["@default('IDR')", "@length(3)"]
        description: "Currency"

      # =======================================================================
      # Source Documents (polymorphic)
      # =======================================================================
      source_type:
        type: string?
        attributes: ["@max(30)"]
        description: "Source document type"

      source_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "Source document ID"

      source_number:
        type: string?
        attributes: ["@max(50)"]
        description: "Source document number"

      # =======================================================================
      # Status
      # =======================================================================
      status:
        type: MovementStatus
        attributes: ["@default(posted)"]
        description: "Movement status"

      # =======================================================================
      # Timing
      # =======================================================================
      movement_date:
        type: datetime
        attributes: ["@required"]
        description: "Movement date/time"

      posted_at:
        type: datetime?
        description: "Posted timestamp"

      # =======================================================================
      # Performed By
      # =======================================================================
      performed_by:
        type: uuid?
        description: "Performed by user"

      # =======================================================================
      # Notes
      # =======================================================================
      reason_detail:
        type: string?
        attributes: ["@max(500)"]
        description: "Detailed reason"

      notes:
        type: string?
        attributes: ["@max(500)"]
        description: "Additional notes"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      product:
        type: Product
        attributes: ["@one", "@foreign_key(product_id)"]
        description: "Product"
        inverse: movements

      warehouse:
        type: Warehouse?
        attributes: ["@one", "@foreign_key(warehouse_id)"]
        description: "Warehouse"
        inverse: movements

      batch:
        type: StockBatch?
        attributes: ["@one", "@foreign_key(batch_id)"]
        description: "Stock batch"
        inverse: movements

      performed_by_user:
        type: sapiens.User?
        attributes: ["@one", "@foreign_key(performed_by)"]
        description: "Performed by"

    indexes:
      - type: unique
        fields: [provider_id, movement_number]
        where: "deleted_at IS NULL"
      - type: index
        fields: [provider_id, product_id, movement_date]
      - type: index
        fields: [provider_id, movement_type, movement_date]
      - type: index
        fields: [provider_id, warehouse_id, movement_date]
      - type: index
        fields: [product_id, batch_id]
      - type: index
        fields: [source_type, source_id]
      - type: index
        fields: [movement_date, status]
